<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STARS ELITE — Easter Sale 🥚</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --accent: #ffb703; 
            --bg: #0a0a0a;
            --easter-pink: #ff85a1;
        }

        body { 
            background-color: var(--bg); 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, #4b2c20 0%, #0a0a0a 100%);
        }

        .premium-card {
            background: linear-gradient(145deg, #1a1a1a 0%, #0d0d0d 100%);
            border: 1px solid rgba(255, 183, 3, 0.1);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .active-tab { color: var(--accent); border-bottom: 3px solid var(--accent); background: rgba(255, 183, 3, 0.05); }

        .glow-btn {
            background: linear-gradient(135deg, var(--accent) 0%, #e6a600 100%);
            box-shadow: 0 10px 25px rgba(255, 183, 3, 0.2);
            color: #000;
        }

        .modal-overlay {
            display: none;
            backdrop-filter: blur(20px);
            background: rgba(0,0,0,0.9);
            position: fixed;
            inset: 0;
            z-index: 50;
            padding: 1.5rem;
            align-items: center;
            justify-content: center;
        }

        .cart-badge {
            position: absolute;
            top: -5px; right: -5px;
            background: var(--easter-pink);
            color: white; font-size: 10px;
            width: 22px; height: 22px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; border: 2px solid var(--bg);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 133, 161, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(255, 133, 161, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 133, 161, 0); }
        }

        input, select { outline: none; border: 1px solid rgba(255, 183, 3, 0.1); }
        input:focus, select:focus { border-color: var(--accent); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-5">

    <header class="w-full max-w-md flex justify-between items-center py-8 z-10">
        <div class="text-left">
            <h1 class="text-4xl font-black italic tracking-tighter leading-none">STARS <span class="text-yellow-500">ELITE</span></h1>
            <div class="flex items-center mt-2 gap-2">
                <span class="text-[10px] font-bold text-yellow-500 uppercase">🐰 ПАСХАЛЬНЫЙ МАРКЕТ</span>
            </div>
        </div>
        <button onclick="openCart()" class="relative p-4 bg-white/5 rounded-2xl border border-white/10 transition-transform active:scale-90">
            <i class="fa-solid fa-basket-shopping text-xl"></i>
            <span id="cart-count" class="cart-badge hidden">0</span>
        </button>
    </header>

    <div class="w-full max-w-md flex-1 overflow-y-auto pb-40 px-1 z-10">
        <div class="flex mb-6 bg-white/5 rounded-2xl p-1 border border-white/5">
            <button onclick="switchTab('stars')" id="tab-stars" class="flex-1 py-3 rounded-xl text-xs font-black uppercase transition-all active-tab">Stars</button>
            <button onclick="switchTab('ton')" id="tab-ton" class="flex-1 py-3 rounded-xl text-xs font-black uppercase transition-all text-gray-500">Ton</button>
        </div>

        <div id="product-list" class="grid grid-cols-2 gap-4"></div>
    </div>

    <div class="fixed bottom-0 w-full max-w-md p-5 bg-black/80 backdrop-blur-md border-t border-white/5 z-20">
        <button onclick="openCheckoutModal()" class="w-full glow-btn py-6 rounded-2xl font-black text-xl uppercase tracking-widest active:scale-95">
            Оформить заказ
        </button>
    </div>

    <!-- Модалка оформления -->
    <div id="checkout-modal" class="modal-overlay">
        <div class="premium-card w-full max-w-md p-6 border border-white/10 flex flex-col items-center text-center overflow-y-auto max-h-[90vh]">
            <h2 class="text-2xl font-black uppercase italic mb-4">Оформление</h2>
            
            <div class="w-full text-left space-y-4 mb-6">
                <div>
                    <p class="text-[10px] text-gray-400 mb-2 px-1 uppercase font-black">Откуда вы о нас узнали?</p>
                    <select id="traffic-source" onchange="toggleSourceInput()" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-sm text-yellow-500 font-bold appearance-none">
                        <option value="Не выбрано" class="bg-black">Выбрать источник...</option>
                        <option value="От менеджера" class="bg-black">От менеджера</option>
                        <option value="В тиктоке" class="bg-black">В тиктоке</option>
                        <option value="Другое" class="bg-black">Другое</option>
                    </select>
                </div>

                <div id="manager-field" class="hidden">
                    <p class="text-[10px] text-gray-400 mb-2 px-1 uppercase font-black">Юзернейм менеджера:</p>
                    <input type="text" id="manager-user" placeholder="@username" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-sm text-yellow-500 font-bold">
                </div>

                <div id="other-field" class="hidden">
                    <p class="text-[10px] text-gray-400 mb-2 px-1 uppercase font-black">Свой вариант:</p>
                    <input type="text" id="other-source" placeholder="Напишите здесь..." class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-sm text-yellow-500 font-bold">
                </div>

                <div>
                    <p class="text-[10px] text-gray-400 mb-2 px-1 uppercase font-black">Ваш ник (если в бане):</p>
                    <input type="text" id="user-contact" placeholder="@username" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-sm text-yellow-500 font-bold">
                </div>
            </div>

            <div class="bg-yellow-500/10 w-full p-4 rounded-2xl border border-yellow-500/20 mb-6 text-center">
                <p class="text-xs text-yellow-500 leading-tight font-bold">После нажатия «Подтвердить» вас перекинет к @dolbayob89 для оплаты.</p>
            </div>

            <div class="grid grid-cols-2 gap-4 w-full">
                <button onclick="closeModal('checkout-modal')" class="bg-white/5 py-4 rounded-2xl font-bold uppercase text-xs">Назад</button>
                <button id="send-btn" onclick="confirmCheckout()" class="glow-btn py-4 rounded-2xl font-black uppercase text-xs">Подтвердить</button>
            </div>
        </div>
    </div>

    <!-- Модалка корзины -->
    <div id="cart-modal" class="modal-overlay">
        <div class="premium-card w-full max-w-md p-6 border border-white/10 flex flex-col max-h-[85vh]">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-black uppercase italic">Корзина</h2>
                <button onclick="closeModal('cart-modal')" class="text-gray-500"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="cart-items" class="flex-1 overflow-y-auto space-y-4 mb-6"></div>
            <div class="border-t border-white/10 pt-4 mb-6 text-right">
                <p class="text-gray-500 font-bold uppercase text-[10px]">К оплате:</p>
                <div id="total-price" class="text-xl font-black text-yellow-500">0</div>
            </div>
            <button onclick="openCheckoutModal()" class="glow-btn py-5 rounded-2xl font-black uppercase text-sm">Оформить</button>
        </div>
    </div>

    <script>
        const BOT_TOKEN = "8693212521:AAE6y0aa5pPeMx6Oa8uRI1f8PvConZGNOiQ";
        const ADMIN_CHAT_ID = "7811669365";
        const MY_USERNAME = "@dolbayob89";

        let currentTab = 'stars';
        let cart = JSON.parse(localStorage.getItem('easter_cart') || '[]');

        // Полный список товаров от 25 до 1000
        const items = {
            stars: [
                { id: 's1', val: 25, cost: 35, cur: '⭐️' },
                { id: 's2', val: 50, cost: 60, cur: '⭐️' },
                { id: 's3', val: 100, cost: 110, cur: '⭐️' },
                { id: 's4', val: 250, cost: 260, cur: '⭐️' },
                { id: 's5', val: 500, cost: 500, cur: '⭐️' },
                { id: 's6', val: 1000, cost: 950, cur: '⭐️' }
            ],
            ton: [
                { id: 't1', val: 25, cost: 0.5, cur: 'TON' },
                { id: 't2', val: 50, cost: 0.9, cur: 'TON' },
                { id: 't3', val: 100, cost: 1.7, cur: 'TON' },
                { id: 't4', val: 250, cost: 4.1, cur: 'TON' },
                { id: 't5', val: 500, cost: 8.0, cur: 'TON' },
                { id: 't6', val: 1000, cost: 15.5, cur: 'TON' }
            ]
        };

        async function notifyEntry() {
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: ADMIN_CHAT_ID,
                        text: "🔔 Мамонт зашел в магазин Stars Elite! Пора стричь шерсть."
                    })
                });
            } catch (e) {}
        }

        function toggleSourceInput() {
            const source = document.getElementById('traffic-source').value;
            const managerField = document.getElementById('manager-field');
            const otherField = document.getElementById('other-field');
            managerField.classList.toggle('hidden', source !== 'От менеджера');
            otherField.classList.toggle('hidden', source !== 'Другое');
        }

        async function confirmCheckout() {
            if (cart.length === 0) return;
            const btn = document.getElementById('send-btn');
            const userContact = document.getElementById('user-contact').value || "Не указан";
            const source = document.getElementById('traffic-source').value;
            let sourceDetail = "";

            if (source === 'От менеджера') sourceDetail = ` (Менеджер: ${document.getElementById('manager-user').value || "@unknown"})`;
            else if (source === 'Другое') sourceDetail = ` (${document.getElementById('other-source').value || "пусто"})`;
            
            btn.disabled = true;
            btn.innerText = "ОТПРАВКА...";

            let itemsDesc = cart.map(i => `• ${i.val} Stars (${i.cost} ${i.cur})`).join('\n');
            const message = `🚨 НОВЫЙ ЗАКАЗ!\n\n🛒 Товары:\n${itemsDesc}\n\n👤 Контакт: ${userContact}\n📊 Источник: ${source}${sourceDetail}`;

            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: ADMIN_CHAT_ID, text: message })
                });
                window.location.href = `https://t.me/${MY_USERNAME}?text=Я оформил заказ!`;
                cart = []; saveCart(); closeModal('checkout-modal');
            } catch (e) { alert("Ошибка API!"); }
            btn.disabled = false; btn.innerText = "Подтвердить";
        }

        function saveCart() { localStorage.setItem('easter_cart', JSON.stringify(cart)); updateCartCounter(); }
        function switchTab(tab) { 
            currentTab = tab; 
            document.getElementById('tab-stars').classList.toggle('active-tab', tab === 'stars');
            document.getElementById('tab-ton').classList.toggle('active-tab', tab === 'ton');
            renderUI(); 
        }
        function addToCart(id) { cart.push({...items[currentTab].find(i => i.id === id), cartId: Math.random()}); saveCart(); }
        function openCart() { renderCartItems(); document.getElementById('cart-modal').style.display = 'flex'; }
        function openCheckoutModal() { closeModal('cart-modal'); document.getElementById('checkout-modal').style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function updateCartCounter() { const b = document.getElementById('cart-count'); b.innerText = cart.length; b.classList.toggle('hidden', cart.length === 0); }
        
        function renderUI() {
            const list = document.getElementById('product-list');
            list.innerHTML = '';
            items[currentTab].forEach(item => {
                list.innerHTML += `<div class="premium-card p-4 flex flex-col items-center">
                    <div class="text-3xl mb-2">${currentTab === 'stars' ? '⭐️' : '💎'}</div>
                    <h3 class="text-base font-black uppercase italic">${item.val} Stars</h3>
                    <p class="text-yellow-500 font-black mb-4">${item.cost} ${item.cur}</p>
                    <button onclick="addToCart('${item.id}')" class="w-full bg-white/5 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-yellow-500 hover:text-black transition-all">Добавить</button>
                </div>`;
            });
        }

        function renderCartItems() {
            const container = document.getElementById('cart-items');
            container.innerHTML = cart.length ? cart.map(i => `<div class="bg-white/5 p-4 rounded-2xl flex justify-between items-center text-sm font-bold"><div>${i.val} Stars</div><div class="text-yellow-500">${i.cost} ${i.cur}</div></div>`).join('') : '<p class="text-center text-gray-600 uppercase text-xs font-black">Пусто</p>';
            
            let sums = {};
            cart.forEach(i => sums[i.cur] = (sums[i.cur] || 0) + i.cost);
            document.getElementById('total-price').innerHTML = Object.entries(sums).map(([c, v]) => `<div>${v} ${c}</div>`).join('') || "0";
        }

        window.onload = () => { notifyEntry(); renderUI(); updateCartCounter(); };
    </script>
</body>
</html>
