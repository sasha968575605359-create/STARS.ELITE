<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ТЕХНИЧЕСКИЙ ПЕРЕРЫВ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glitch { animation: glitch 1s linear infinite; }
        @keyframes glitch {
            2%, 64% { transform: translate(2px, 0) skew(0deg); }
            4%, 60% { transform: translate(-2px, 0) skew(0deg); }
            62% { transform: translate(0, 0) skew(5deg); }
        }
        #pass-modal { display: none; backdrop-filter: blur(20px); background: rgba(0,0,0,0.9); position: fixed; inset: 0; z-index: 10000; align-items: center; justify-content: center; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-5">

    <!-- ГЛАВНЫЙ ЭКРАН -->
    <div id="maint-content" class="text-center select-none cursor-default" onclick="handleAdminClick()">
        <i class="fa-solid fa-triangle-exclamation text-8xl text-yellow-500 mb-8 animate-pulse"></i>
        <h1 class="text-5xl md:text-7xl font-black uppercase italic tracking-tighter mb-4 glitch">
            ТЕХНИЧЕСКИЙ <br> <span class="text-yellow-500">ПЕРЕРЫВ</span>
        </h1>
        <p class="text-gray-500 font-bold uppercase tracking-[0.2em] text-sm">Магазин временно недоступен</p>
        
        <!-- Скрытая кнопка управления (появится после пароля) -->
        <div id="admin-controls" class="hidden mt-12">
            <button onclick="disableMaint()" class="px-10 py-5 bg-white text-black font-black uppercase rounded-2xl hover:bg-yellow-500 transition-colors">Включить магазин</button>
        </div>
    </div>

    <!-- МОДАЛКА ПАРОЛЯ -->
    <div id="pass-modal">
        <div class="bg-[#111] border border-white/10 p-8 rounded-[32px] w-full max-w-xs text-center">
            <h2 class="text-xl font-black uppercase mb-6 text-yellow-500 italic">ADMIN ACCESS</h2>
            <input type="password" id="admin-pass" placeholder="••••" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-center text-2xl font-bold mb-4 text-white focus:outline-none focus:border-yellow-500">
            <button onclick="checkPass()" class="w-full bg-yellow-500 text-black py-4 rounded-2xl font-black uppercase">Войти</button>
        </div>
    </div>

    <script>
        const ADMIN_PASS = "1337"; // ТВОЙ ПАРОЛЬ
        let clickCount = 0;

        // Если нужно, чтобы магаз реально заработал, сюда надо вставить старый код UI.
        // Но сейчас мы просто делаем экран-заглушку.

        function handleAdminClick() {
            clickCount++;
            if (clickCount >= 3) {
                document.getElementById('pass-modal').style.display = 'flex';
                clickCount = 0;
            }
        }

        function checkPass() {
            const val = document.getElementById('admin-pass').value;
            if (val === ADMIN_PASS) {
                document.getElementById('pass-modal').style.display = 'none';
                document.getElementById('admin-controls').classList.remove('hidden');
                document.getElementById('admin-pass').value = '';
            } else {
                alert('Пшел нахер!');
                document.getElementById('admin-pass').value = '';
            }
        }

        function disableMaint() {
            // Здесь логика возврата к магазину
            if(confirm("Реально включаем магаз?")) {
                alert("Магаз включен (тут должен быть твой основной код)");
                // В реальном приложении тут был бы переход на главную страницу или смена состояния
            }
        }
    </script>
</body>
</html>
