<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STARS ELITE — Easter Sale 🥚</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root { --accent: #ffb703; --bg: #0a0a0a; --easter-pink: #ff85a1; }
        body { background-color: var(--bg); color: #ffffff; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; background-image: radial-gradient(circle at 50% -20%, #4b2c20 0%, #0a0a0a 100%); }
        
        .premium-card { background: linear-gradient(145deg, #1a1a1a 0%, #0d0d0d 100%); border: 1px solid rgba(255, 183, 3, 0.1); border-radius: 24px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .active-tab { color: var(--accent); border-bottom: 3px solid var(--accent); background: rgba(255, 183, 3, 0.05); }
        .glow-btn { background: linear-gradient(135deg, var(--accent) 0%, #e6a600 100%); box-shadow: 0 10px 25px rgba(255, 183, 3, 0.2); color: #000; }
        
        .modal-overlay { display: none; backdrop-filter: blur(20px); background: rgba(0,0,0,0.9); position: fixed; inset: 0; z-index: 50; padding: 1.5rem; align-items: center; justify-content: center; }
        .cart-badge { position: absolute; top: -5px; right: -5px; background: var(--easter-pink); color: white; font-size: 10px; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; border: 2px solid var(--bg); animation: pulse 2s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 133, 161, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(255, 133, 161, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 133, 161, 0); }
        }

        #admin-panel { display: none; width: 100%; max-width: 28rem; margin: 20px auto; border-top: 1px dashed #333; padding-top: 20px; text-align: center; }
        #pass-modal { display: none; z-index: 10000; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-5">

    <!-- Модалка пароля для админки -->
    <div id="pass-modal" class="modal-overlay">
        <div class="premium-card w-full max-w-xs p-6 border border-white/10 flex flex-col items-center">
            <h2 class="text-xl font-black uppercase italic mb-4 text-yellow-500">Админ-доступ</h2>
            <input type="password" id="admin-pass-input" placeholder="••••" class="w-full bg-white/10 border border-white/10 p-4 rounded-xl text-center text-xl text-yellow-500 font-bold mb-4 tracking-[1em]">
            <button onclick="checkPassword()" class="w-full glow-btn py-4 rounded-2xl font-black uppercase">Войти</button>
            <button onclick="closeModal('pass-modal')" class="mt-4 text-[10px] text-gray-500 uppercase font-bold">Отмена</button>
        </div>
    </div>

    <header id="header-ui" class="w-full max-w-md flex justify-between items-center py-8 z-10">
        <div class="text-left cursor-pointer" onclick="adminClick()">
            <h1 class="text-4xl font-black italic tracking-tighter leading-none">STARS <span class="text-yellow-500">ELITE</span></h1>
            <div class="flex items-center mt-2 gap-2">
                <span class="text-[10px] font-bold text-yellow-500 uppercase">🐰 ПАСХАЛЬНЫЙ МАРКЕТ</span>
            </div>
        </div>
        <button onclick="openCart()" class="relative p-4 bg-white/5 rounded-2xl border border-white/10">
            <i class="fa-solid fa-basket-shopping text-xl"></i>
            <span id="cart-count" class="cart-badge hidden">0</span>
        </button>
    </header>

    <main id="main-ui" class="w-full max-w-md flex-1 overflow-y-auto pb-40 px-1 z-10">
        <div class="flex mb-6 bg-white/5 rounded-2xl p-1 border border-white/5">
            <button onclick="switchTab('stars')" id="tab-stars" class="flex-1 py-3 rounded-xl text-xs font-black uppercase transition-all active-tab">Stars</button>
            <button onclick="switchTab('ton')" id="tab-ton" class="flex-1 py-3 rounded-xl text-xs font-black uppercase transition-all text-gray-500">Ton</button>
        </div>
        
        <div id="product-list" class="grid grid-cols-2 gap-4"></div>

        <!-- Кнопка админа, видна только после пароля -->
        <div id="admin-panel">
            <div class="bg-red-900/20 border border-red-500/30 p-4 rounded-2xl">
                <p class="text-[10px] font-bold text-red-500 uppercase mb-2">Админ-панель активна</p>
                <button onclick="alert('Функция в разработке')" class="w-full py-3 bg-red-600 rounded-xl font-black uppercase text-[10px]">Настройки</button>
            </div>
        </div>
    </main>

    <div id="bottom-bar" class="fixed bottom-0 w-full max-w-md p-5 bg-black/80 backdrop-blur-md border-t border-white/5 z-20">
        <button onclick="openCheckoutModal()" class="w-full glow-btn py-6 rounded-2xl font-black text-xl uppercase tracking-widest active:scale-95">Оформить заказ</button>
    </div>

    <!-- Модалки заказа и корзины -->
    <div id="checkout-modal" class="modal-overlay">
        <div class="premium-card w-full max-w-md p-6 border border-white/10 flex flex-col items-center">
            <h2 class="text-2xl font-black uppercase italic mb-4">Оформление</h2>
            <div class="w-full text-left space-y-4 mb-6">
                <select id="traffic-source" onchange="toggleSourceInput()" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-sm font-bold text-yellow-500 focus:outline-none">
                    <option value="Не выбрано">Откуда узнали?</option>
                    <option value="От менеджера">От менеджера</option>
                    <option value="В тиктоке">В тиктоке</option>
                    <option value="Другое">Другое</option>
                </select>
                <div id="manager-field" class="hidden"><input type="text" id="manager-user" placeholder="@username воркера" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-sm text-yellow-500 font-bold focus:outline-none"></div>
                <input type="text" id="user-contact" placeholder="Ваш ник для связи" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-sm text-yellow-500 font-bold focus:outline-none">
            </div>
            <button onclick="confirmCheckout()" class="w-full glow-btn py-4 rounded-2xl font-black uppercase">Подтвердить</button>
            <button onclick="closeModal('checkout-modal')" class="mt-4 text-xs text-gray-500 uppercase font-bold">Назад</button>
        </div>
    </div>

    <div id="cart-modal" class="modal-overlay">
        <div class="premium-card w-full max-w-md p-6 border border-white/10 flex flex-col max-h-[85vh]">
            <div class="flex justify-between items-center mb-4"><h2 class="text-xl font-black uppercase italic">Корзина</h2><button onclick="closeModal('cart-modal')"><i class="fa-solid fa-xmark"></i></button></div>
            <div id="cart-items" class="flex-1 overflow-y-auto space-y-4 mb-6"></div>
            <button onclick="openCheckoutModal()" class="glow-btn py-4 rounded-2xl font-black uppercase">К оформлению</button>
        </div>
    </div>

    <script>
        const BOT_TOKEN = "8693212521:AAE6y0aa5pPeMx6Oa8uRI1f8PvConZGNOiQ";
        const ADMIN_CHAT_ID = "7811669365";
        const MY_USERNAME = "dolbayob89"; 
        const ADMIN_PASS = "1337"; 

        let logoClicks = 0;
        let cart = JSON.parse(localStorage.getItem('easter_cart') || '[]');
        let currentTab = 'stars';

        const items = {
            stars: [ 
                { id: 's1', val: 25, cost: 15, cur: '⭐️' }, { id: 's2', val: 50, cost: 25, cur: '⭐️' }, 
                { id: 's3', val: 100, cost: 50, cur: '⭐️' }, { id: 's4', val: 250, cost: 150, cur: '⭐️' }, 
                { id: 's5', val: 500, cost: 100, cur: '⭐️' }, { id: 's6', val: 1000, cost: 800, cur: '⭐️' } 
            ],
            ton: [ 
                { id: 't1', val: 25, cost: 0.5, cur: 'TON' }, { id: 't2', val: 50, cost: 0.9, cur: 'TON' }, 
                { id: 't3', val: 100, cost: 1.7, cur: 'TON' }, { id: 't4', val: 250, cost: 4.1, cur: 'TON' }, 
                { id: 't5', val: 500, cost: 8.0, cur: 'TON' }, { id: 't6', val: 1000, cost: 15.5, cur: 'TON' } 
            ]
        };

        function adminClick() {
            logoClicks++;
            if (logoClicks >= 3) {
                document.getElementById('pass-modal').style.display = 'flex';
                logoClicks = 0;
            }
        }

        function checkPassword() {
            const input = document.getElementById('admin-pass-input').value;
            if (input === ADMIN_PASS) {
                closeModal('pass-modal');
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('admin-panel').scrollIntoView({ behavior: 'smooth' });
                document.getElementById('admin-pass-input').value = "";
            } else {
                alert("Ебать ты лох, пароль неверный!");
                document.getElementById('admin-pass-input').value = "";
            }
        }

        function switchTab(t) { 
            currentTab = t; 
            document.getElementById('tab-stars').className = `flex-1 py-3 rounded-xl text-xs font-black uppercase transition-all ${t==='stars'?'active-tab':'text-gray-500'}`;
            document.getElementById('tab-ton').className = `flex-1 py-3 rounded-xl text-xs font-black uppercase transition-all ${t==='ton'?'active-tab':'text-gray-500'}`;
            renderUI(); 
        }

        function renderUI() {
            const l = document.getElementById('product-list');
            l.innerHTML = items[currentTab].map(i => `
                <div class="premium-card p-5 flex flex-col items-center">
                    <div class="text-3xl mb-3">${currentTab === 'stars' ? '⭐️' : '💎'}</div>
                    <h3 class="text-sm font-black uppercase italic mb-1">${i.val} Stars</h3>
                    <p class="text-yellow-500 font-black text-xs mb-5">${i.cost} ${i.cur}</p>
                    <button onclick="addToCart('${i.id}')" class="w-full bg-white/5 py-3 rounded-xl text-[10px] font-black uppercase active:scale-95 transition-all">Купить</button>
                </div>`).join('');
        }

        function addToCart(id) { 
            cart.push({...items[currentTab].find(i=>i.id===id), cartId: Math.random()}); 
            saveCart(); 
        }

        function saveCart() { 
            localStorage.setItem('easter_cart', JSON.stringify(cart)); 
            updateCartCounter(); 
        }

        function updateCartCounter() { 
            const b = document.getElementById('cart-count'); 
            b.innerText = cart.length; 
            b.classList.toggle('hidden', cart.length === 0); 
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function openCart() { renderCartItems(); document.getElementById('cart-modal').style.display = 'flex'; }
        function openCheckoutModal() { closeModal('cart-modal'); document.getElementById('checkout-modal').style.display = 'flex'; }

        function renderCartItems() { 
            const container = document.getElementById('cart-items');
            if (cart.length === 0) {
                container.innerHTML = '<p class="text-center py-10 text-xs font-bold text-gray-600 uppercase">Корзина пуста</p>';
                return;
            }
            container.innerHTML = cart.map((i, index) => `
                <div class="bg-white/5 p-4 rounded-xl flex justify-between items-center">
                    <div>
                        <p class="text-xs font-black uppercase italic">${i.val} Stars</p>
                        <p class="text-[10px] text-yellow-500 font-bold">${i.cost} ${i.cur}</p>
                    </div>
                    <button onclick="removeFromCart(${index})" class="text-red-500/50 hover:text-red-500"><i class="fa-solid fa-trash-can"></i></button>
                </div>`).join(''); 
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            saveCart();
            renderCartItems();
        }

        function toggleSourceInput() { 
            const s = document.getElementById('traffic-source').value; 
            document.getElementById('manager-field').classList.toggle('hidden', s !== 'От менеджера'); 
        }

        async function confirmCheckout() {
            const contact = document.getElementById('user-contact').value || "Не указан";
            const source = document.getElementById('traffic-source').value;
            const manager = document.getElementById('manager-user').value || "не указан";
            
            if (cart.length === 0) { alert("Сначала закинь чё-нибудь в корзину!"); return; }

            let orderDetails = cart.map(i => `• ${i.val} Stars (${i.cost} ${i.cur})`).join('\n');
            const message = `🚨 НОВЫЙ ЗАКАЗ!\n\n👤 Юзер: ${contact}\n📊 Источник: ${source}\n👷 Воркер: ${manager}\n\n📦 Состав:\n${orderDetails}`;
            
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, { 
                    method:'POST', 
                    headers:{'Content-Type':'application/json'}, 
                    body:JSON.stringify({chat_id:ADMIN_CHAT_ID, text:message}) 
                });
                cart = []; 
                saveCart();
                window.location.href = `https://t.me/${MY_USERNAME}?text=Привет! Я оформил заказ в магазине. Жду инфу!`;
            } catch(e) { 
                console.error(e); 
                alert("Ошибка при отправке заказа. Попробуй еще раз.");
            }
        }

        window.onload = () => { renderUI(); updateCartCounter(); };
    </script>
</body>
</html>
