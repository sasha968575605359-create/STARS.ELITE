<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stars Elite - Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background: #000; 
            color: #fff; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .header-bg {
            background: linear-gradient(to bottom, #0f172a 0%, #000 100%);
        }
        .stars-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.2s ease;
        }
        .stars-card:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.06);
        }
        .tab-active {
            border-bottom: 2px solid #00aeef;
            color: #00aeef;
        }
        .order-btn {
            background: linear-gradient(180deg, #0088cc 0%, #005588 100%);
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.3);
        }
        @keyframes slideDown {
            0% { transform: translateY(-100%); opacity: 0; }
            10% { transform: translateY(0); opacity: 1; }
            90% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100%); opacity: 0; }
        }
        .notification {
            animation: slideDown 4s ease-in-out infinite;
        }
        /* Модалка */
        #modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="pb-32">

<div id="modal">
    <div class="bg-[#111] border border-white/10 p-8 rounded-3xl w-[90%] max-w-[400px] text-center">
        <div class="text-5xl mb-4">🛒</div>
        <h2 class="text-2xl font-black italic uppercase mb-2">Ваш заказ</h2>
        <p class="text-gray-400 text-sm mb-6">Итого к оплате с учетом скидки:</p>
        <div class="text-4xl font-black text-[#00aeef] mb-8" id="modal-total">0 ★</div>
        <div class="space-y-3">
            <a href="https://t.me/your_bot_link" class="block order-btn py-4 rounded-xl font-black uppercase tracking-tighter">Перейти в бота</a>
            <button onclick="closeModal()" class="block w-full py-4 text-gray-500 font-bold uppercase text-xs">Отмена</button>
        </div>
    </div>
</div>

<div class="header-bg pt-6 pb-4 px-4 sticky top-0 z-50">
    <div class="absolute top-2 left-1/2 -translate-x-1/2 w-full flex justify-center pointer-events-none">
        <div class="notification bg-black/60 backdrop-blur-md border border-white/10 px-4 py-1.5 rounded-full text-[10px] flex items-center space-x-2">
            <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
            <span>Юзер <span class="text-blue-400" id="notif-user">@user77</span> купил <span class="font-bold text-yellow-400" id="notif-stars">200 Stars</span></span>
        </div>
    </div>

    <div class="flex justify-between items-start mt-4">
        <div>
            <h1 class="text-2xl font-black italic tracking-tighter uppercase leading-none">Stars <span class="text-[#00aeef]">Elite</span></h1>
            <div class="flex items-center space-x-2 mt-2">
                <div class="bg-green-500/20 px-2 py-0.5 rounded text-[8px] font-bold text-green-400 flex items-center">
                    <span class="w-1 h-1 bg-green-500 rounded-full mr-1"></span> 146 ONLINE
                </div>
                <div class="bg-white/10 px-2 py-0.5 rounded text-[8px] font-bold text-gray-300">BRONZE</div>
            </div>
        </div>
        <div class="relative">
            <button class="bg-white/5 p-3 rounded-2xl border border-white/10">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            </button>
            <div id="cart-count" class="absolute -top-1 -right-1 bg-[#00aeef] text-black text-[10px] font-black w-5 h-5 rounded-full flex items-center justify-center hidden">0</div>
        </div>
    </div>

    <div class="flex mt-8 border-b border-white/5">
        <div class="flex-1 text-center pb-3 text-[10px] font-black uppercase tracking-widest tab-active">Stars</div>
        <div class="flex-1 text-center pb-3 text-[10px] font-black uppercase tracking-widest text-gray-500">TG Premium</div>
        <div class="flex-1 text-center pb-3 text-[10px] font-black uppercase tracking-widest text-gray-500">TON Crypto</div>
    </div>
</div>

<div class="px-4 mt-6 space-y-3">
    <div class="bg-yellow-500/10 border border-yellow-500/20 p-4 rounded-2xl mb-6">
        <div class="flex justify-between items-center">
            <div>
                <div class="text-[10px] text-yellow-500 font-bold uppercase">Easter Abuse Event</div>
                <div class="text-lg font-black italic">СКИДКА -50% (ОТ 50 ЗВЕЗД)</div>
            </div>
            <div class="text-3xl">🐣</div>
        </div>
    </div>

    <div class="grid grid-cols-1 gap-3" id="items-container">
        <!-- Генерируется скриптом -->
    </div>

    <div class="pt-6 pb-2">
        <h2 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Telegram Premium</h2>
    </div>

    <div class="stars-card p-4 rounded-2xl border-blue-500/30 bg-blue-500/5 flex justify-between items-center" onclick="addToCart(300, 'Premium 1 Month')">
        <div>
            <h3 class="text-lg font-black italic uppercase leading-none text-blue-400">Premium 1 Month</h3>
            <div class="flex items-center mt-1">
                <span class="text-white font-bold text-sm">150</span>
                <span class="ml-1 text-yellow-500 text-xs">★</span>
                <span class="ml-2 text-[10px] text-gray-500 line-through">300</span>
            </div>
        </div>
        <button class="bg-white/5 w-10 h-10 rounded-xl flex items-center justify-center border border-white/5">+</button>
    </div>
</div>

<div class="fixed bottom-0 left-0 w-full p-4 bg-gradient-to-t from-black via-black to-transparent z-50">
    <button onclick="openModal()" class="order-btn w-full py-5 rounded-2xl text-lg font-black uppercase tracking-tighter transform active:scale-95 transition-all">
        Оформить заказ <span id="btn-total" class="ml-2 opacity-70"></span>
    </button>
</div>

<script>
    document.oncontextmenu = () => false;

    let cartTotal = 0;
    let rawTotal = 0;

    const items = [25, 50, 100, 200, 300, 400];
    const container = document.getElementById('items-container');

    // Рендер товаров
    items.forEach(count => {
        const div = document.createElement('div');
        div.className = 'stars-card p-4 rounded-2xl flex justify-between items-center';
        div.onclick = () => addToCart(count);
        div.innerHTML = `
            <div>
                <h3 class="text-lg font-black italic uppercase leading-none">${count} Stars</h3>
                <div class="flex items-center mt-1">
                    <span class="text-blue-400 font-bold text-sm">${count > 50 ? count / 2 : count}</span>
                    <span class="ml-1 text-yellow-500 text-xs">★</span>
                    ${count > 50 ? `<span class="ml-2 text-[10px] text-gray-500 line-through">${count}</span>` : ''}
                </div>
            </div>
            <button class="bg-white/5 w-10 h-10 rounded-xl flex items-center justify-center border border-white/5">+</button>
        `;
        container.appendChild(div);
    });

    function addToCart(amount) {
        rawTotal += amount;
        updateUI();
        
        // Визуальный фидбек
        const btn = document.querySelector('.order-btn');
        btn.classList.add('scale-105');
        setTimeout(() => btn.classList.remove('scale-105'), 100);
    }

    function updateUI() {
        // Логика скидки: если сумма > 50 звезд, то -50%
        if (rawTotal >= 50) {
            cartTotal = rawTotal / 2;
        } else {
            cartTotal = rawTotal;
        }

        const btnTotal = document.getElementById('btn-total');
        const cartCount = document.getElementById('cart-count');
        
        if (cartTotal > 0) {
            btnTotal.innerText = `(${cartTotal} ★)`;
            cartCount.innerText = "!";
            cartCount.classList.remove('hidden');
        }
    }

    function openModal() {
        if (cartTotal === 0) return;
        document.getElementById('modal-total').innerText = `${cartTotal} ★`;
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
    }

    // Рандомные уведомления
    const names = ['@makarov_dev', '@skidrow', '@user99', '@anon_tg', '@dark_star', '@crypto_king'];
    const packs = [50, 100, 200, 300, 400];
    
    setInterval(() => {
        document.getElementById('notif-user').innerText = names[Math.floor(Math.random() * names.length)];
        document.getElementById('notif-stars').innerText = packs[Math.floor(Math.random() * packs.length)] + " Stars";
    }, 4000);

    console.log("%c SHOP READY. LOGIC LOADED. ", "background: #00aeef; color: black; font-weight: bold; padding: 10px;");
</script>

</body>
</html>
